site_name: IoT Security Gateway
site_description: Documentation for the SDN-based IoT security gateway
site_author: TeraUK
site_url: https://iot-gateway.readthedocs.io/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - kroki
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ml-pipeline/app
            - ml-pipeline/train
            - ryu/apps
            - scripts
            - Services/dns-cache-updater
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - tables
  - toc:
      permalink: true

watch:
  - scripts
  - installation
  - Services/zeek-mirror
  - zeek

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
    - Overview: architecture/overview.md
    - Network Topology: architecture/network-topology.md
    - Log Generation: architecture/log-generation.md
    - Automated Anomaly Detection and Isolation: architecture/detection-to-isolation-loop.md
    - Traffic Path Sequence Diagram: architecture/traffic-path-sequence-diagrams.md
  - Components:
    - OVS and Ryu: components/ovs-ryu.md
    - Zeek: components/zeek.md
    - AdGuard Home: components/adguard.md
    - ML Pipeline: components/ml-pipeline.md
    - dnsmasq: components/dnsmasq.md
    - hostapd: components/hostapd.md
    - nftables: components/nftables.md
  - Reference:
    - REST API: reference/api.md
    - Configuration: reference/configuration.md
    - Log Formats: reference/log-formats.md
  - Operations:
    - Device Onboarding: operations/device-onboarding.md
    - Training the Model: operations/training-the-model.md
    - Alert Response: operations/alert-response.md
    - Log Maintenance: operations/log-maintenance.md
  - Services:
    - Overview: services/services-overview.md
    - Zeek Mirror: services/zeek-mirror.md
    - DNS Cache Updater: services/dns-cache-updater.md
  - Scripts: 
    - Overview: scripts/Scripts.md
    - Health Check: scripts/health-check.md
    - Log Maintenance: scripts/log-maintenance.md
    - Profile Builder: scripts/profile-builder.md
    - Verification Scripts: scripts/verification-scripts.md
  - Requirements: requirements/Requirements.md
  - Python Code Ref:
    - ML Pipeline: python-code-reference/ml-pipeline.md
    - Model Training: python-code-reference/training.md
    - Ryu Gateway Policy App: python-code-reference/ryu-gateway-policy-app.md
    - Profile Builder: python-code-reference/profile-builder.md
    - DNS Cache Updater: python-code-reference/dns-cache-updater.md
  - Shell Code Ref:
    - Overview: shell-code-reference/index.md
    - Installation:
      - install.sh: shell-code-reference/install.md
      - build-docs.sh: shell-code-reference/build-docs.md
    - Scripts:
      - health-check.sh: shell-code-reference/health-check.md
      - log-maintenance.sh: shell-code-reference/log-maintenance.md
      - verify-phase1.sh: shell-code-reference/verify-phase1.md
      - verify-phase2.sh: shell-code-reference/verify-phase2.md
      - verify-phase3.sh: shell-code-reference/verify-phase3.md
      - verify-phase4.sh: shell-code-reference/verify-phase4.md
    - Services:
      - attach-zeek-mirror.sh: shell-code-reference/attach-zeek-mirror.md
  - Zeek Code Ref:
    - Overview: zeek-code-reference/index.md
    - entrypoint.sh: zeek-code-reference/entrypoint.md
    - local.zeek: zeek-code-reference/local-zeek.md
    - Detection Scripts:
      - __load__.zeek: zeek-code-reference/load.md
      - alert-framework.zeek: zeek-code-reference/alert-framework.md
      - detect-port-scan.zeek: zeek-code-reference/detect-port-scan.md
      - detect-dns-anomaly.zeek: zeek-code-reference/detect-dns-anomaly.md
