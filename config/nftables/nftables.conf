flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy accept;
        # Accept all for now. Will tighten when Ryu policy app is mature.
    }

    chain forward {
        type filter hook forward priority 0; policy accept;

        # Block DNS-over-TLS from IoT devices
        # IoT devices have no legitimate reason to use DoT directly.
        # All DNS must go through AdGuard. If a device tries to reach
        # port 853 on any external server, drop it and log the attempt.
        iifname "br0" ip saddr 192.168.50.0/24 tcp dport 853 counter log prefix "IOT-DOT-BLOCKED: " drop

        # Block DNS-over-QUIC from IoT devices
        # Same rationale as DoT, but for the QUIC-based DNS protocol (port 8853).
        iifname "br0" ip saddr 192.168.50.0/24 udp dport 8853 counter log prefix "IOT-DOQ-BLOCKED: " drop

        # Note: I am NOT blocking port 443 (HTTPS) here to prevent DoH bypass.
        # That would break all HTTPS traffic. DoH bypass will be handled in
        # Phase 2/3 via per-device allowlists in Ryu (POL-02), which restrict
        # each device to specific destination IPs. A device that can only reach
        # its manufacturer's API server cannot reach a public DoH resolver.
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;

        # Any DNS query from the IoT subnet that is NOT addressed to the
        # gateway (192.168.50.1) gets redirected to AdGuard's container IP.
        # This catches devices with hardcoded DNS servers (e.g., 8.8.8.8).
        iifname "br0" ip saddr 192.168.50.0/24 ip daddr != 192.168.50.1 udp dport 53 dnat to 172.20.0.53
        iifname "br0" ip saddr 192.168.50.0/24 ip daddr != 192.168.50.1 tcp dport 53 dnat to 172.20.0.53
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # Masquerade IoT subnet traffic going out via enp2s0
        oifname "enp2s0" ip saddr 192.168.50.0/24 masquerade
    }
}
